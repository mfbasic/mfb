name: coverage
on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Run coverage
        run: sh scripts/coverage.sh
      - name: Per-file 95% gate
        run: sh scripts/coverage-check.sh
      - name: Global floor gate
        run: |
          cargo llvm-cov report --workspace \
            --ignore-filename-regex '(^|/)(target|tests)/|repository/target/|_runtime_tables\.rs$|/code/private/unicode\.rs$' \
            --fail-under-lines 95
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: target/coverage
