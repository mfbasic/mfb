name: coverage
on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generated-artifact integrity (bug-339 A1)
        run: sh scripts/check-generated.sh
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Run coverage
        run: sh scripts/coverage.sh
      - name: Per-file 95% gate
        run: sh scripts/coverage-check.sh
      - name: Global floor gate
        run: |
          . ./scripts/coverage-common.sh
          cargo llvm-cov report $PKG_FLAGS \
            --ignore-filename-regex "$IGNORE" \
            --fail-under-lines 95
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: target/coverage
